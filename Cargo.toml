[workspace]
resolver = "2"
members = [
    "crates/tinycortex",
    "packages/sdk-rust",
]

[workspace.package]
edition = "2021"
license = "MIT"
repository = "https://github.com/tinyhumansai/neocortex"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
uuid = { version = "1", features = ["serde", "v4"] }
